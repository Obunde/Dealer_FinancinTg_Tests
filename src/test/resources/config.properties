# ============================================================
# SCF Platform (Faulu Dealer Financing) — non-secret defaults
#
# CREDENTIALS AND URLS LIVE IN .env AT THE PROJECT ROOT
# (see .env.example). Any key here can also be overridden with a
# JVM system property (-Dbank.url=...) or an environment variable
# in upper-snake-case (bank.maker.password -> BANK_MAKER_PASSWORD).
# ============================================================

# ---------- Browser ----------
browser=chromium
headless=true
slowmo.ms=0
timeout.ms=30000
trace.on.failure=true

# ---------- Portal URLs ----------
# All actors use the same platform URL — set the values in .env
# (APP_URL / SYSTEMADMIN_URL / BANK_URL / ANCHOR_URL / DEALER_URL).
# systemadmin.url / bank.url / anchor.url / dealer.url resolve from there.

# ---------- Credentials ----------
# Set in .env:
#   SYSTEMADMIN_MAKER_USERNAME / SYSTEMADMIN_MAKER_PASSWORD   (Emtech admin maker)
#   SYSTEMADMIN_CHECKER_USERNAME / SYSTEMADMIN_CHECKER_PASSWORD
#   BANK_MAKER_USERNAME / BANK_MAKER_PASSWORD                 (Faulu)
#   BANK_CHECKER_USERNAME / BANK_CHECKER_PASSWORD
#   ANCHOR_* and DEALER_*  (created during the E2E flow — see docs/E2E-FLOW.md)
